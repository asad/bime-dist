<main id="test-main" class="container-wide" style="padding-top:1rem">
    <h1 style="font-size:1.5rem">BIME &mdash; BioInception Molecular Editor</h1>
    <p class="text-muted">Internal test page. Draw molecules, reactions, and test I/O.</p>

    <div class="test-grid">
        <!-- Editor -->
        <div>
            <div id="bime-editor" style="width:100%;height:460px"></div>
            <div class="test-actions" style="margin-top:0.5rem">
                <button class="test-btn" onclick="loadSmiles('c1ccccc1')">Benzene</button>
                <button class="test-btn" onclick="loadSmiles('CC(=O)Oc1ccccc1C(=O)O')">Aspirin</button>
                <button class="test-btn" onclick="loadSmiles('Cn1c(=O)c2c(ncn2C)n(C)c1=O')">Caffeine</button>
                <button class="test-btn" onclick="loadSmiles('CC(CC(=O)N[C@@H](CS)C(=O)NCC(=O)O)[C@H](N)C(=O)O')">Glutathione</button>
                <button class="test-btn" onclick="loadSmiles('CCO>>CC=O')">Reaction</button>
                <button class="test-btn" onclick="loadSmiles('c1ccc2ccccc2c1')">Naphthalene</button>
                <button class="test-btn" onclick="loadSmiles('c1ccc2[nH]ccc2c1')">Indole</button>
                <button class="test-btn" onclick="loadSmiles('[CH3:1][OH:2]>>[CH2:1]=[O:2]')">Mapped Rxn</button>
            </div>
        </div>

        <!-- Output -->
        <div>
            <div class="test-panel">
                <h3>SMILES Output</h3>
                <textarea id="smiles-out" class="test-ta" rows="3" readonly></textarea>
                <div class="test-actions">
                    <button class="test-btn" onclick="doExport('smiles')">SMILES</button>
                    <button class="test-btn" onclick="doExport('mol')">MOL V2000</button>
                    <button class="test-btn" onclick="doExport('mol3')">MOL V3000</button>
                </div>
            </div>

            <div class="test-panel" style="margin-top:1rem">
                <h3>Import</h3>
                <textarea id="import-in" class="test-ta" rows="3" placeholder="Paste SMILES or MOL here..."></textarea>
                <div class="test-actions">
                    <button class="test-btn" onclick="doImport()">Load</button>
                </div>
            </div>

            <div class="test-panel" style="margin-top:1rem">
                <h3>Stats</h3>
                <div id="stats" style="font-size:0.85rem;color:var(--color-text-muted)"></div>
            </div>
        </div>
    </div>
</main>

<script src="editor/SmilesWriter.js?v=1.8.16"></script>
<script src="editor/MolfileWriter.js?v=1.8.16"></script>
<script src="editor/Renderer.js?v=1.8.16"></script>
<script src="editor/History.js?v=1.8.16"></script>
<script src="editor/Tools.js?v=1.8.16"></script>
<script src="editor/CipStereo.js?v=1.8.16"></script>
<script src="editor/SmartsParser.js?v=1.8.16"></script>
<script src="editor/SmartsMatch.js?v=1.8.16"></script>
<script src="editor/SmartsWriter.js?v=1.8.16"></script>
<script src="editor/MolEditor.js?v=1.8.16"></script>
<script src="common-molecules.js?v=1.8.16"></script>
<script src="editor/SMSDVersion.js?v=1.8.16"></script>
<script src="editor/SMSDGraph.js?v=1.8.16"></script>
<script src="editor/SMSDVF2.js?v=1.8.16"></script>
<script src="editor/SMSDMCS.js?v=1.8.16"></script>
<script src="editor/SMSDRings.js?v=1.8.16"></script>
<script src="editor/SMSDBatch.js?v=1.8.16"></script>
<script src="editor/RDT.js?v=1.8.16"></script>
<script>
var editor;

// Initialise BIME editor
// but here we just init directly
document.addEventListener('DOMContentLoaded', function() {
    editor = new MolEditor('bime-editor', '100%', '460px', {
        options: 'hydrogens'
    });

    editor.setCallBack('AfterStructureModified', function() {
        document.getElementById('smiles-out').value = editor.smiles();
        updateStats();
    });

    // Load benzene as default
    loadSmiles('c1ccccc1');
});

function loadSmiles(smi) {
    if (!editor) return;
    editor.readGenericMolecularInput(smi);
    document.getElementById('smiles-out').value = editor.smiles();
    updateStats();
}

function doExport(fmt) {
    if (!editor) return;
    var out = document.getElementById('smiles-out');
    switch(fmt) {
        case 'smiles': out.value = editor.smiles(); break;
        case 'mol': out.value = editor.molFile(false); break;
        case 'mol3': out.value = editor.molFile(true); break;
    }
}

function doImport() {
    var input = document.getElementById('import-in').value.trim();
    if (input && editor) {
        editor.readGenericMolecularInput(input);
        document.getElementById('smiles-out').value = editor.smiles();
        updateStats();
    }
}

function updateStats() {
    if (!editor) return;
    var el = document.getElementById('stats');
    el.textContent = editor.totalNumberOfAtoms() + ' atoms, ' + editor.totalNumberOfBonds() + ' bonds';
}
</script>
