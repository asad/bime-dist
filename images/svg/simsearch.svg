<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Magnifying glass lens -->
  <circle cx="10.5" cy="10.5" r="7" stroke="#0d9488" stroke-width="1.6" fill="none"/>
  <!-- Glass handle -->
  <line x1="15.8" y1="15.8" x2="21.5" y2="21.5" stroke="#0d9488" stroke-width="2.2"/>
  <!-- Small molecule inside lens (pentagon with nodes) -->
  <g stroke="#0d9488" stroke-width="1.2">
    <line x1="8" y1="7" x2="12" y2="7"/>
    <line x1="12" y1="7" x2="13.5" y2="10.5"/>
    <line x1="13.5" y1="10.5" x2="10.5" y2="13"/>
    <line x1="10.5" y1="13" x2="7" y2="10.5"/>
    <line x1="7" y1="10.5" x2="8" y2="7"/>
  </g>
  <!-- Atom nodes -->
  <circle cx="8" cy="7" r="1.2" fill="#0d9488" stroke="none"/>
  <circle cx="12" cy="7" r="1.2" fill="#0d9488" stroke="none"/>
  <circle cx="13.5" cy="10.5" r="1.2" fill="#0d9488" stroke="none"/>
  <circle cx="10.5" cy="13" r="1.2" fill="#0d9488" stroke="none"/>
  <circle cx="7" cy="10.5" r="1.2" fill="#0d9488" stroke="none"/>
  <!-- Similarity indicator: percentage arc -->
  <path d="M 5.5 15 A 7 7 0 0 1 3.5 10.5" stroke="#ca8a04" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M 3.5 10.5 A 7 7 0 0 1 5.5 6" stroke="#059669" stroke-width="1.5" fill="none" opacity="0.7"/>
</svg>
