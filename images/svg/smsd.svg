<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Molecule 1: small hexagon (top-left) -->
  <g stroke="#0d9488" stroke-width="1.5">
    <polygon points="6,3 9,1.5 12,3 12,6 9,7.5 6,6"/>
  </g>
  <circle cx="6" cy="3" r="1" fill="#0d9488" stroke="none"/>
  <circle cx="9" cy="1.5" r="1" fill="#0d9488" stroke="none"/>
  <circle cx="12" cy="3" r="1" fill="#0d9488" stroke="none"/>
  <circle cx="12" cy="6" r="1" fill="#0d9488" stroke="none"/>
  <circle cx="9" cy="7.5" r="1" fill="#0d9488" stroke="none"/>
  <circle cx="6" cy="6" r="1" fill="#0d9488" stroke="none"/>
  <!-- Molecule 2: small hexagon (bottom-right) -->
  <g stroke="#0d9488" stroke-width="1.5" opacity="0.5">
    <polygon points="12,16.5 15,15 18,16.5 18,19.5 15,21 12,19.5"/>
  </g>
  <circle cx="12" cy="16.5" r="1" fill="#0d9488" opacity="0.5" stroke="none"/>
  <circle cx="15" cy="15" r="1" fill="#0d9488" opacity="0.5" stroke="none"/>
  <circle cx="18" cy="16.5" r="1" fill="#0d9488" opacity="0.5" stroke="none"/>
  <circle cx="18" cy="19.5" r="1" fill="#0d9488" opacity="0.5" stroke="none"/>
  <circle cx="15" cy="21" r="1" fill="#0d9488" opacity="0.5" stroke="none"/>
  <circle cx="12" cy="19.5" r="1" fill="#0d9488" opacity="0.5" stroke="none"/>
  <!-- MCS mapping lines -->
  <line x1="12" y1="6" x2="12" y2="16.5" stroke="#ca8a04" stroke-width="1" stroke-dasharray="2,1.5" opacity="0.6"/>
  <line x1="9" y1="7.5" x2="15" y2="21" stroke="#ca8a04" stroke-width="1" stroke-dasharray="2,1.5" opacity="0.6"/>
  <!-- MCS overlap indicator -->
  <circle cx="12" cy="11" r="2.5" fill="#0d9488" opacity="0.15" stroke="none"/>
</svg>
